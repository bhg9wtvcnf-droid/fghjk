<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Моя страница</title>

<style>
body {
    margin: 0;
    height: 100vh;
    overflow: hidden;
    background: black;
    display: flex;
    justify-content: center;
    align-items: center;
}

/* Фото на весь экран */
.photo {
    width: 100vw;
    height: 100vh;
    object-fit: cover;
}

/* Сердечки */
.heart {
    position: absolute;
    bottom: -50px;
    font-size: 30px;
    animation: up 5s linear infinite;
}

@keyframes up {
    from {
        transform: translateY(0);
        opacity: 1;
    }

    to {
        transform: translateY(-110vh);
        opacity: 0;
    }
}
</style>
</head>

<body>

<img class="photo" src="IMG_1690.jpg" alt="Фото">

<script>
function createHeart() {
    let heart = document.createElement("div");

    heart.className = "heart";
    heart.innerHTML = "❤️";

    heart.style.left = Math.random() * 100 + "vw";
    heart.style.animationDuration = (3 + Math.random() * 3) + "s";

    document.body.appendChild(heart);

    setTimeout(() => {
        heart.remove();
    }, 6000);
}

setInterval(createHeart, 300);
</script>

</body>
</html>
